<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Confirmation - CloudReserve</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .confirmation-wrapper {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .confirmation-box {
            background: var(--white);
            padding: 48px 44px;
            border-radius: var(--radius-lg);
            text-align: center;
            box-shadow: var(--shadow-hover);
            max-width: 520px;
            width: 100%;
            border: 1.5px solid var(--border);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(16px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Checkmark circle */
        .checkmark-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #1b3f72;
            margin: 0 auto 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(27, 63, 114, 0.35); }
            70%  { box-shadow: 0 0 0 18px rgba(27, 63, 114, 0); }
            100% { box-shadow: 0 0 0 0 rgba(27, 63, 114, 0); }
        }

        .checkmark {
            font-size: 48px;
            color: var(--white);
            font-weight: 700;
            line-height: 1;
            animation: rotateIn 0.45s ease both;
            animation-delay: 0.15s;
        }

        @keyframes rotateIn {
            from { transform: rotate(-180deg) scale(0); opacity: 0; }
            to   { transform: rotate(0) scale(1); opacity: 1; }
        }

        /* Heading */
        .confirmation-box h2 {
            color: var(--blue-deep);
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .confirmation-box h2::after {
            content: '';
            display: block;
            width: 48px;
            height: 3px;
            background: var(--blue-deep);
            border-radius: var(--radius-pill);
            margin: 10px auto 0;
        }

        /* Message card */
        .message-card {
            background: var(--blue-pale);
            padding: 20px 24px;
            border-radius: var(--radius-md);
            margin: 26px 0 20px;
            border: 1.5px solid var(--border);
        }

        .message-card p {
            font-size: 16px;
            color: var(--text-dark);
            line-height: 1.65;
            margin: 0;
        }

        /* Optional details block */
        .confirmation-details {
            background: var(--blue-pale);
            border-radius: var(--radius-md);
            padding: 4px 20px;
            margin: 20px 0;
            text-align: left;
            border: 1.5px solid var(--border);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-row:last-child { border-bottom: none; }

        .detail-label {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 14px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 28px;
        }

        .confirmation-box a {
            display: inline-block;
            padding: 13px 36px;
            background: var(--blue-deep);
            color: var(--white);
            text-decoration: none;
            border-radius: var(--radius-pill);
            font-weight: 700;
            font-size: 15px;
            border: 1.5px solid var(--blue-deep);
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            letter-spacing: 0.3px;
            min-width: 200px;
        }

        .confirmation-box a:hover {
            background: var(--blue-mid);
            border-color: var(--blue-mid);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(27, 63, 114, 0.25);
            text-decoration: none;
        }

        .confirmation-box a.secondary {
            background: var(--white);
            color: var(--text-dark);
            border: 1.5px solid var(--border);
        }

        .confirmation-box a.secondary:hover {
            background: var(--blue-pale);
            border-color: var(--blue-bright);
        }

        /* Footer note */
        .confirmation-note {
            margin-top: 22px;
            font-size: 13px;
            color: var(--text-muted);
        }

        @media (max-width: 600px) {
            .confirmation-box { padding: 32px 20px; }
            .confirmation-box h2 { font-size: 26px; }
            .action-buttons { flex-direction: column; }
            .confirmation-box a { width: 100%; min-width: unset; }
            .checkmark-circle { width: 84px; height: 84px; }
            .checkmark { font-size: 40px; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🍽️ CloudReserve</h1>
    </header>

    <main>
        <div class="confirmation-wrapper">
            <div class="confirmation-box">

                <div class="checkmark-circle">
                    <div class="checkmark">✓</div>
                </div>

                <h2>Success!</h2>

                <div class="message-card">
                    <p>{{ message }}</p>
                </div>

                <!--
                <div class="confirmation-details">
                    <div class="detail-row">
                        <span class="detail-label">Confirmation #</span>
                        <span class="detail-value">RES-2024-001</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Date</span>
                        <span class="detail-value">March 17, 2026</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Time</span>
                        <span class="detail-value">7:00 PM</span>
                    </div>
                </div>
                -->

                <div class="action-buttons">
                    <a href="/dashboard">← Back to Dashboard</a>
                </div>

                <p class="confirmation-note">A confirmation has been sent to your email.</p>

            </div>
        </div>
    </main>
</body>
</html>
